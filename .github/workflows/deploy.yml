name: Build & Deploy to https://github.com/kkys00/deardream-frontend

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    container: pandoc/latex

    steps:
      - name: Checkout source
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare output
        shell: sh
        run: |
          # enable extglob and dotglob might not work in sh
          # Use alternative commands for file copying
          rm -rf output
          mkdir output
          # Use find command instead of extglob pattern
          find . -maxdepth 1 -not -path "./output" -not -path "./.git" -not -path "./.github" -exec cp -R {} output/ \;

      - name: Push to https://github.com/kkys00/deardream-frontend
        id: push
        uses: cpina/github-action-push-to-another-repository@v1.7.2
        env:
          API_TOKEN_GITHUB: ${{ secrets.DD_PAT }}
        with:
          source-directory: "output"
          destination-github-username: kkys00
          destination-repository-name: deardream-frontend
          user-name: GitHub Actions
          user-email: 1903020@ewhain.net
          commit-message: "Deploy from build: ${{ github.sha }}"
          target-branch: develop

      - name: "Debug: show cloned dir"
        run: echo "Cloned into $DESTINATION_CLONED_DIRECTORY"
